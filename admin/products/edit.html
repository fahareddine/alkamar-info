<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Éditer produit — Alkamar Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div id="alert" class="alert" style="display:none"></div>
      <div class="page-header">
        <div>
          <a href="/admin/products/" style="font-size:13px;color:var(--admin-muted)">← Produits</a>
          <h1 id="page-title" style="margin-top:4px">Nouveau produit</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button type="button" id="btn-preview" class="btn btn--ghost">👁 Aperçu</button>
          <button type="button" id="btn-draft" class="btn btn--warning">Brouillon</button>
          <button type="button" id="btn-save" class="btn btn--primary">Enregistrer</button>
        </div>
      </div>

      <!-- Mise à jour depuis URL fournisseur -->
      <div class="import-bar" id="reimport-bar" style="margin-bottom:16px">
        <input type="url" id="reimport-url" class="form-control" placeholder="🔄 URL fournisseur pour mettre à jour ce produit...">
        <button type="button" id="btn-reimport" class="btn btn--ghost">🔄 Pré-remplir</button>
      </div>

      <form id="product-form">
        <input type="hidden" name="features" id="hidden-features" value="[]">
        <div class="product-layout">

          <!-- COLONNE PRINCIPALE -->
          <div class="product-col-main">

            <!-- Informations générales -->
            <div class="form-card">
              <h2>Informations générales</h2>
              <div class="form-group">
                <label>Nom *</label>
                <input type="text" name="name" class="form-control" required placeholder="Nom du produit">
              </div>
              <div class="form-group">
                <label>Slug</label>
                <div class="slug-wrap">
                  <span class="slug-prefix">/produit/</span>
                  <input type="text" name="slug" class="form-control" placeholder="mon-produit">
                  <button type="button" id="btn-regen-slug" class="btn btn--ghost btn--sm">↺ Regénérer</button>
                </div>
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label>Marque</label>
                  <input type="text" name="brand" class="form-control" placeholder="Apple, Samsung...">
                </div>
                <div class="form-group">
                  <label>Sous-titre</label>
                  <input type="text" name="subtitle" class="form-control" placeholder="Courte accroche">
                </div>
              </div>
              <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="5" placeholder="Description complète du produit..."></textarea>
              </div>
            </div>

            <!-- Médias -->
            <div class="form-card">
              <h2>Médias</h2>
              <div class="form-group">
                <label>Image principale</label>
                <input type="url" name="image" class="form-control" placeholder="https://...">
                <img id="img-preview" class="img-preview" src="" alt="Aperçu image">
              </div>
              <div class="form-group">
                <label>Galerie</label>
                <div class="gallery-grid" id="gallery-grid"></div>
                <div class="gallery-add">
                  <input type="url" id="gallery-url-input" class="form-control" placeholder="URL image à ajouter...">
                  <button type="button" id="gallery-add-btn" class="btn btn--ghost btn--sm">Ajouter</button>
                </div>
              </div>
            </div>

            <!-- Photos IA -->
            <div class="form-card" id="ia-photos-card">
              <h2 style="display:flex;align-items:center;gap:10px">
                Photos IA
                <span id="ia-status-badge" class="ia-badge ia-badge--idle">● idle</span>
              </h2>

              <div class="form-group">
                <label>Source</label>
                <div style="display:flex;flex-direction:column;gap:6px">
                  <label style="font-weight:normal;display:flex;align-items:center;gap:8px">
                    <input type="radio" name="ia-source" value="urls" checked> URLs directes (3 images)
                  </label>
                  <label style="font-weight:normal;display:flex;align-items:center;gap:8px">
                    <input type="radio" name="ia-source" value="page"> Page fournisseur
                  </label>
                </div>
              </div>

              <div id="ia-urls-inputs">
                <div class="form-group">
                  <label>URL image 1</label>
                  <input type="url" id="ia-url-1" class="form-control" placeholder="https://...">
                </div>
                <div class="form-group">
                  <label>URL image 2</label>
                  <input type="url" id="ia-url-2" class="form-control" placeholder="https://...">
                </div>
                <div class="form-group">
                  <label>URL image 3</label>
                  <input type="url" id="ia-url-3" class="form-control" placeholder="https://...">
                </div>
              </div>

              <div id="ia-page-input" style="display:none">
                <div class="form-group">
                  <label>URL de la page fournisseur</label>
                  <input type="url" id="ia-page-url" class="form-control" placeholder="https://fournisseur.com/produit-xyz">
                </div>
              </div>

              <button type="button" id="btn-fetch-images" class="btn btn--ghost">↓ Récupérer les images</button>

              <div id="ia-sources-preview" style="display:none;margin-top:12px">
                <label style="font-size:13px;color:var(--admin-muted)">Aperçu sources</label>
                <div style="display:flex;gap:8px;margin-top:6px" id="ia-sources-thumbs"></div>
                <p id="ia-partial-msg" style="display:none;color:var(--admin-warning);font-size:13px;margin-top:6px"></p>
              </div>

              <button type="button" id="btn-process-images" class="btn btn--primary" style="margin-top:12px;display:none">
                ✨ Lancer traitement IA
              </button>

              <div id="ia-results" style="display:none;margin-top:16px">
                <label style="font-size:13px;color:var(--admin-muted)">Résultats</label>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px" id="ia-results-grid"></div>
              </div>
            </div>
            <!-- /Photos IA -->

            <!-- Caractéristiques -->
            <div class="form-card">
              <h2>Caractéristiques (specs)</h2>
              <div id="specs-container"></div>
              <button type="button" id="add-spec" class="btn btn--ghost btn--sm" style="margin-top:8px">+ Ajouter</button>
            </div>

            <!-- SEO -->
            <div class="form-card">
              <h2>Référencement SEO</h2>
              <div class="form-group">
                <label>SEO Title</label>
                <input type="text" id="seo-title" class="form-control" placeholder="Titre pour Google...">
              </div>
              <div class="form-group">
                <label>SEO Description</label>
                <textarea id="seo-desc" class="form-control" rows="3" placeholder="Description pour les moteurs de recherche..."></textarea>
                <small id="seo-desc-count" style="color:var(--admin-muted)">0/160</small>
              </div>
            </div>

          </div><!-- /product-col-main -->

          <!-- COLONNE LATÉRALE -->
          <div class="product-col-side">

            <!-- Publication -->
            <div class="form-card">
              <h2>Publication</h2>
              <div class="form-group">
                <label>Statut</label>
                <select name="status" class="form-control">
                  <option value="active">Actif</option>
                  <option value="draft">Brouillon</option>
                  <option value="archived">Archivé</option>
                </select>
              </div>
              <div class="form-actions-sticky">
                <button type="button" id="btn-save-side" class="btn btn--primary" onclick="saveProduct()">Enregistrer</button>
                <button type="button" class="btn btn--warning btn--sm" onclick="saveProduct('draft')">Brouillon</button>
              </div>
            </div>

            <!-- Catégorie & Tags -->
            <div class="form-card">
              <h2>Catégorie &amp; Tags</h2>
              <div class="form-group">
                <label>Catégorie</label>
                <select name="category_id" class="form-control" id="cat-select">
                  <option value="">— Sélectionner —</option>
                </select>
              </div>
              <div class="form-group">
                <label>Tags</label>
                <div class="tags-container">
                  <div class="tags-wrap" id="tags-wrap">
                    <input type="text" class="tag-input" id="tag-input" placeholder="Ajouter un tag...">
                  </div>
                  <ul class="tags-suggestions" id="tags-suggestions" style="display:none"></ul>
                </div>
              </div>
            </div>

            <!-- Tarification -->
            <div class="form-card">
              <h2>Tarification</h2>
              <div class="form-group">
                <label>Prix EUR *</label>
                <input type="number" name="price_eur" class="form-control" step="0.01" min="0" placeholder="0.00">
              </div>
              <div class="form-group">
                <label>Prix KMF</label>
                <input type="number" name="price_kmf" class="form-control" min="0" placeholder="Auto-calculé">
              </div>
              <div class="form-group">
                <label>Prix barré EUR</label>
                <input type="number" name="price_old" class="form-control" step="0.01" min="0" placeholder="Prix avant remise">
              </div>
            </div>

            <!-- Inventaire -->
            <div class="form-card">
              <h2>Inventaire</h2>
              <div class="form-group">
                <label>SKU</label>
                <input type="text" name="sku" class="form-control" placeholder="Référence interne">
              </div>
              <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" class="form-control" min="0" value="0">
              </div>
              <div class="form-group">
                <label>Libellé stock</label>
                <input type="text" name="stock_label" class="form-control" placeholder="En stock">
              </div>
            </div>

            <!-- Badge -->
            <div class="form-card">
              <h2>Badge</h2>
              <div class="form-group">
                <label>Texte badge</label>
                <input type="text" name="badge" class="form-control" placeholder="ex: Nouveau, Promo...">
              </div>
              <div class="form-group">
                <label>Classe CSS</label>
                <input type="text" name="badge_class" class="form-control" placeholder="ex: badge--new">
              </div>
            </div>

          </div><!-- /product-col-side -->

        </div><!-- /product-layout -->
      </form>

      <!-- Modal aperçu -->
      <div id="preview-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center">
        <div style="background:var(--admin-surface);border-radius:12px;padding:24px;max-width:400px;width:90%;position:relative">
          <button onclick="document.getElementById('preview-modal').style.display='none'" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--admin-muted);font-size:20px;cursor:pointer">×</button>
          <h3 style="margin-bottom:16px;font-size:14px;color:var(--admin-muted)">Aperçu produit</h3>
          <img id="preview-img" style="width:100%;height:200px;object-fit:cover;border-radius:8px;background:var(--admin-bg);margin-bottom:12px" src="" alt="">
          <div id="preview-badge-wrap"></div>
          <h2 id="preview-name" style="font-size:18px;font-weight:700;margin:8px 0 4px"></h2>
          <p id="preview-subtitle" style="font-size:13px;color:var(--admin-muted);margin-bottom:8px"></p>
          <div style="display:flex;gap:12px;align-items:baseline">
            <span id="preview-price" style="font-size:20px;font-weight:700;color:var(--admin-accent)"></span>
            <span id="preview-price-old" style="font-size:14px;color:var(--admin-muted);text-decoration:line-through"></span>
          </div>
          <div id="preview-stock" style="font-size:12px;margin-top:8px;color:var(--admin-muted)"></div>
        </div>
      </div>

    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/admin/js/config.js"></script>
  <script src="/admin/js/auth.js"></script>
  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/layout.js"></script>
  <script src="/admin/js/product-edit.js"></script>
</body>
</html>
