<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produits — Info Experts Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">

      <div class="page-header">
        <h1>Produits</h1>
        <a href="/admin/products/edit.html" class="btn btn--primary">+ Nouveau produit</a>
      </div>

      <!-- Import URL -->
      <div class="import-bar">
        <input type="url" id="import-url" class="form-control" placeholder="Coller une URL produit fournisseur...">
        <select id="import-cat" class="form-control" style="max-width:200px">
          <option value="">— Catégorie —</option>
        </select>
        <button type="button" id="btn-import" class="btn btn--primary">↓ Importer</button>
      </div>

      <div class="product-stats">
        <div class="product-stat">
          <span>Total</span>
          <strong id="stat-total">—</strong>
        </div>
        <div class="product-stat">
          <span>Actifs</span>
          <strong id="stat-active">—</strong>
        </div>
        <div class="product-stat">
          <span>Brouillons</span>
          <strong id="stat-draft">—</strong>
        </div>
        <div class="product-stat">
          <span>Archivés</span>
          <strong id="stat-archived">—</strong>
        </div>
      </div>

      <div class="filters-bar">
        <input type="text" id="search" class="form-control" placeholder="Rechercher un produit...">
        <select id="filter-status" class="form-control">
          <option value="all">Tous les statuts</option>
          <option value="active">Actifs</option>
          <option value="draft">Brouillons</option>
          <option value="archived">Archivés</option>
        </select>
        <select id="filter-cat" class="form-control">
          <option value="">Toutes catégories</option>
        </select>
        <select id="filter-sort" class="form-control">
          <option value="name">Nom</option>
          <option value="price_eur">Prix</option>
          <option value="stock">Stock</option>
          <option value="created_at">Date</option>
        </select>
      </div>

      <div id="bulk-bar" class="bulk-bar bulk-bar--hidden">
        <span id="bulk-count" class="bulk-bar__count">0 sélectionné</span>
        <button id="btn-bulk-publish" class="btn btn--primary btn--sm">Publier</button>
        <button id="btn-bulk-archive" class="btn btn--ghost btn--sm">Archiver</button>
        <button id="btn-bulk-delete" class="btn btn--danger btn--sm">Supprimer</button>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th class="check-col"><input type="checkbox" id="select-all"></th>
              <th class="th-sort" data-sort="name">Produit</th>
              <th>SKU</th>
              <th>Catégorie</th>
              <th class="th-sort" data-sort="price_eur">Prix EUR</th>
              <th class="th-sort" data-sort="stock">Stock</th>
              <th>Statut</th>
              <th class="th-sort" data-sort="created_at">Modifié</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-body">
            <tr><td colspan="9" style="text-align:center;padding:32px;color:var(--admin-muted)">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="btn-prev" class="btn btn--ghost btn--sm" disabled>← Précédent</button>
        <span id="page-info" class="pagination__info">Page 1</span>
        <button id="btn-next" class="btn btn--ghost btn--sm">Suivant →</button>
      </div>

    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/admin/js/config.js"></script>
  <script src="/admin/js/auth.js"></script>
  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/layout.js"></script>
  <script src="/admin/js/products-list.js"></script>
  <script>
    // Charger les catégories dans le select d'import
    async function loadImportCategories() {
      try {
        const cats = await api.get('/api/categories');
        const sel = document.getElementById('import-cat');
        (cats || []).forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id; opt.textContent = c.name;
          sel.appendChild(opt);
        });
      } catch {}
    }
    loadImportCategories();

    document.getElementById('btn-import')?.addEventListener('click', async () => {
      let url = document.getElementById('import-url').value.trim();
      if (!url.startsWith('http')) url = 'https://' + url;
      if (!url.startsWith('http')) { alert('Entrez une URL valide'); return; }
      const category_id = document.getElementById('import-cat').value || null;
      const btn = document.getElementById('btn-import');
      btn.disabled = true; btn.textContent = '⏳ Import en cours...';
      try {
        const product = await api.post('/api/products?action=import', { url, category_id });
        window.location.href = `/admin/products/edit.html?id=${product.id}`;
      } catch (err) {
        alert('Erreur import : ' + (err.message || err));
        btn.disabled = false; btn.textContent = '↓ Importer';
      }
    });
    document.getElementById('import-url')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-import').click();
    });
  </script>
</body>
</html>
