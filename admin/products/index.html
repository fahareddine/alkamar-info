<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produits — Alkamar Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">

      <div class="page-header">
        <h1>Produits</h1>
        <a href="/admin/products/edit.html" class="btn btn--primary">+ Nouveau produit</a>
      </div>

      <div class="product-stats">
        <div class="product-stat">
          <span>Total</span>
          <strong id="stat-total">—</strong>
        </div>
        <div class="product-stat">
          <span>Actifs</span>
          <strong id="stat-active">—</strong>
        </div>
        <div class="product-stat">
          <span>Brouillons</span>
          <strong id="stat-draft">—</strong>
        </div>
        <div class="product-stat">
          <span>Archivés</span>
          <strong id="stat-archived">—</strong>
        </div>
      </div>

      <div class="filters-bar">
        <input type="text" id="search" class="form-control" placeholder="Rechercher un produit...">
        <select id="filter-status" class="form-control">
          <option value="all">Tous les statuts</option>
          <option value="active">Actifs</option>
          <option value="draft">Brouillons</option>
          <option value="archived">Archivés</option>
        </select>
        <select id="filter-cat" class="form-control">
          <option value="">Toutes catégories</option>
        </select>
        <select id="filter-sort" class="form-control">
          <option value="name">Nom</option>
          <option value="price_eur">Prix</option>
          <option value="stock">Stock</option>
          <option value="created_at">Date</option>
        </select>
      </div>

      <div id="bulk-bar" class="bulk-bar bulk-bar--hidden">
        <span id="bulk-count" class="bulk-bar__count">0 sélectionné</span>
        <button id="btn-bulk-publish" class="btn btn--primary btn--sm">Publier</button>
        <button id="btn-bulk-archive" class="btn btn--ghost btn--sm">Archiver</button>
        <button id="btn-bulk-delete" class="btn btn--danger btn--sm">Supprimer</button>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th class="check-col"><input type="checkbox" id="select-all"></th>
              <th class="th-sort" data-sort="name">Produit</th>
              <th>SKU</th>
              <th>Catégorie</th>
              <th class="th-sort" data-sort="price_eur">Prix EUR</th>
              <th class="th-sort" data-sort="stock">Stock</th>
              <th>Statut</th>
              <th class="th-sort" data-sort="created_at">Modifié</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-body">
            <tr><td colspan="9" style="text-align:center;padding:32px;color:var(--admin-muted)">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="btn-prev" class="btn btn--ghost btn--sm" disabled>← Précédent</button>
        <span id="page-info" class="pagination__info">Page 1</span>
        <button id="btn-next" class="btn btn--ghost btn--sm">Suivant →</button>
      </div>

    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/admin/js/config.js"></script>
  <script src="/admin/js/auth.js"></script>
  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/layout.js"></script>
  <script src="/admin/js/products-list.js"></script>
</body>
</html>
