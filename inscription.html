<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — La Boutique</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;background:var(--light)}
    .auth-card{background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.10);padding:36px;width:100%;max-width:480px}
    .auth-title{font-size:1.4rem;font-weight:900;color:#0f172a;margin-bottom:6px;text-align:center}
    .auth-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:22px}
    .auth-field{margin-bottom:13px}
    .auth-field label{display:block;font-size:13px;font-weight:700;color:#334155;margin-bottom:5px}
    .req{color:#ef4444}
    .auth-field input,.auth-field select{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
    .auth-field input:focus,.auth-field select:focus{border-color:var(--primary)}
    .auth-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .auth-btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
    .auth-btn--primary{background:var(--primary);color:#fff}
    .auth-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid #e5e7eb}
    .auth-check{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#374151;margin-bottom:12px}
    .auth-check input{width:auto;flex-shrink:0;margin-top:2px;accent-color:var(--primary)}
    .auth-error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;color:#dc2626;margin-bottom:14px;display:none}
    .auth-success{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:16px;font-size:14px;color:#059669;text-align:center;display:none}
    .auth-links{text-align:center;margin-top:16px;font-size:13px;color:var(--text-muted)}
    .auth-links a{color:var(--primary);font-weight:600}
    @media(max-width:480px){.auth-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="header" style="position:relative"><div class="header__inner">
    <a href="index.html" class="logo"><div class="logo__icon">B</div><span class="logo__text">La <span>Boutique</span></span></a>
  </div></header>
  <div class="auth-page"><div class="auth-card">
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Rejoignez La Boutique — livraison aux Comores</p>
    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success">📧 Email de vérification envoyé à <strong id="email-sent"></strong>.<br>Vérifiez votre boîte puis <a href="/connexion.html">connectez-vous</a>.</div>
    <form id="register-form" onsubmit="register(event)">
      <div class="auth-section">Connexion</div>
      <div class="auth-field"><label>Email <span class="req">*</span></label><input type="email" id="email" required placeholder="votre@email.com"></div>
      <div class="auth-row">
        <div class="auth-field"><label>Mot de passe <span class="req">*</span></label><input type="password" id="password" required minlength="8" placeholder="Min. 8 car."></div>
        <div class="auth-field"><label>Confirmer <span class="req">*</span></label><input type="password" id="password2" required placeholder="Répéter"></div>
      </div>
      <div class="auth-section">Livraison</div>
      <div class="auth-row">
        <div class="auth-field"><label>Prénom <span class="req">*</span></label><input type="text" id="first_name" required></div>
        <div class="auth-field"><label>Nom <span class="req">*</span></label><input type="text" id="last_name" required></div>
      </div>
      <div class="auth-field"><label>Téléphone <span class="req">*</span></label><input type="tel" id="phone" required placeholder="+269 33 12 345"></div>
      <div class="auth-row">
        <div class="auth-field"><label>Pays <span class="req">*</span></label><select id="country"><option value="KM" selected>Comores 🇰🇲</option><option value="FR">France 🇫🇷</option><option value="RE">Réunion</option><option value="MG">Madagascar</option><option value="DJ">Djibouti</option></select></div>
        <div class="auth-field"><label>Ville <span class="req">*</span></label><input type="text" id="city" required placeholder="Moroni"></div>
      </div>
      <div class="auth-field"><label>Adresse <span class="req">*</span></label><input type="text" id="address" required placeholder="Rue, quartier…"></div>
      <div class="auth-field"><label>Code postal <small style="color:#94a3b8">(optionnel)</small></label><input type="text" id="postal_code"></div>
      <div class="auth-check"><input type="checkbox" id="terms" required><label for="terms">J'accepte les <a href="#" target="_blank">CGV</a> <span class="req">*</span></label></div>
      <div class="auth-check"><input type="checkbox" id="privacy"><label for="privacy">J'accepte la <a href="#" target="_blank">politique de confidentialité</a></label></div>
      <button type="submit" class="auth-btn auth-btn--primary" id="register-btn">Créer mon compte</button>
    </form>
    <div class="auth-links">Déjà un compte ? <a href="/connexion.html">Se connecter</a></div>
  </div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth-client.js"></script>
  <script>
    function showError(m){const el=document.getElementById('auth-error');el.textContent=m;el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'nearest'});}
    async function register(e){
      e.preventDefault();
      const btn=document.getElementById('register-btn');
      const email=document.getElementById('email').value.trim();
      const pwd=document.getElementById('password').value;
      const pwd2=document.getElementById('password2').value;
      if(pwd!==pwd2){showError('Les mots de passe ne correspondent pas.');return;}
      if(!document.getElementById('terms').checked){showError('Vous devez accepter les CGV.');return;}
      btn.disabled=true;btn.textContent='Création…';
      document.getElementById('auth-error').style.display='none';
      const {data:authData,error:authErr}=await AuthClient.signUp(email,pwd);
      if(authErr){
        let msg = authErr.message;
        if(msg.includes('rate limit') || msg.includes('over_email_send_rate_limit') || msg.includes('email rate')) {
          msg = 'Trop de tentatives d\'inscription. Réessayez dans une heure ou utilisez un autre email.';
          showError(msg);
        } else {
          showError(msg);
        }
        btn.disabled=false;btn.textContent='Créer mon compte';return;
      }
      if(authData.session){
        try{
          await AuthClient.saveProfile({
            first_name:document.getElementById('first_name').value.trim(),
            last_name:document.getElementById('last_name').value.trim(),
            phone:document.getElementById('phone').value.trim(),
            country:document.getElementById('country').value,
            city:document.getElementById('city').value.trim(),
            address:document.getElementById('address').value.trim(),
            postal_code:document.getElementById('postal_code').value.trim(),
            terms:true,privacy:document.getElementById('privacy').checked,
          });
          window.location.href='/compte.html';return;
        }catch(err){console.warn('Profil non sauvegardé:',err.message);}
      }
      document.getElementById('register-form').style.display='none';
      document.getElementById('email-sent').textContent=email;
      document.getElementById('auth-success').style.display='block';
    }
  </script>
</body>
</html>
